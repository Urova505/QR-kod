<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Пользовательский генератор QR-кодов с логотипом</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-primary: #a855f7; /* Лавандовый */
            --accent-secondary: #22d3ee; /* Неоновый голубой */
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --border-color: #334155;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background-color: var(--card-bg);
            padding: 2.5rem;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), 
                        0 0 20px rgba(168, 85, 247, 0.1);
            width: 100%;
            max-width: 500px;
            text-align: center;
            box-sizing: border-box;
        }

        h1 {
            font-size: 1.75rem;
            margin-bottom: 2rem;
            background: linear-gradient(to right, var(--accent-secondary), var(--accent-primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .section {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        .label-desc {
            font-size: 0.9rem;
            color: var(--text-dim);
            margin-bottom: 0.6rem;
            display: block;
        }

        input[type="text"] {
            width: 100%;
            padding: 14px 18px;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            background-color: #0f172a;
            color: white;
            font-size: 1rem;
            box-sizing: border-box;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 10px rgba(168, 85, 247, 0.3);
        }

        .settings-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 1.5rem;
        }

        .color-picker-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #0f172a;
            padding: 10px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            box-sizing: border-box;
        }

        input[type="color"] {
            border: none;
            width: 35px;
            height: 35px;
            cursor: pointer;
            background: none;
            padding: 0;
            appearance: none;
            -webkit-appearance: none;
        }
        
        input[type="color"]::-webkit-color-swatch-wrapper {
            padding: 0;
        }
        input[type="color"]::-webkit-color-swatch {
            border: none;
            border-radius: 8px;
        }

        .file-input-wrapper {
            width: 100%;
            position: relative;
            overflow: hidden;
            display: inline-block;
        }

        .btn-file {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: 2px dashed var(--border-color);
            background-color: transparent;
            color: var(--text-dim);
            font-size: 0.9rem;
            cursor: pointer;
            transition: background-color 0.3s ease, border-color 0.3s ease;
            box-sizing: border-box;
            text-align: center;
        }
        
        .btn-file:hover {
            background-color: rgba(255,255,255,0.05);
            border-color: var(--text-dim);
        }

        .file-input-wrapper input[type=file] {
            font-size: 100px;
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            cursor: pointer;
        }

        #qrcode-container {
            background-color: white;
            padding: 25px;
            border-radius: 20px;
            display: inline-block;
            margin: 2rem 0;
            box-shadow: 0 0 35px rgba(34, 211, 238, 0.25);
            min-height: 200px;
            min-width: 200px;
            box-sizing: border-box;
        }

        #qrcode canvas {
            display: block;
            margin: 0 auto;
        }

        .btn-download {
            width: 100%;
            padding: 16px;
            border-radius: 14px;
            border: none;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            color: white;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s, box-shadow 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            box-sizing: border-box;
        }

        .btn-download:hover {
            opacity: 0.95;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .btn-download:active {
            transform: translateY(1px);
        }

        .hint {
            font-size: 0.8rem;
            color: var(--text-dim);
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>✨ QR Генератор с Лого</h1>

    <div class="section">
        <span class="label-desc">1. Введите ссылку или текст:</span>
        <input type="text" id="text-input" placeholder="https://ваша-ссылка.ком" autocomplete="off">
    </div>

    <div class="section">
        <span class="label-desc">2. Настройте внешний вид:</span>
        <div class="settings-grid">
            <div class="color-picker-wrapper">
                <input type="color" id="fg-color" value="#000000">
                <span style="font-size: 0.85rem">Цвет кода</span>
            </div>
            <div class="color-picker-wrapper">
                <input type="color" id="bg-color" value="#ffffff">
                <span style="font-size: 0.85rem">Цвет фона</span>
            </div>
        </div>
        
        <div class="file-input-wrapper">
            <div class="btn-file" id="file-label">Выбрать логотип (PNG/JPG)</div>
            <input type="file" id="logo-input" accept="image/png, image/jpeg">
        </div>
    </div>

    <div id="qrcode-container">
        <div id="qrcode"></div>
    </div>

    <button class="btn-download" id="download-btn">
        📥 Скачать готовый PNG
    </button>
    
    <p class="hint">QR-код и логотип обновляются автоматически</p>
</div>

<script>
    const textInput = document.getElementById('text-input');
    const fgColor = document.getElementById('fg-color');
    const bgColor = document.getElementById('bg-color');
    const logoInput = document.getElementById('logo-input');
    const fileLabel = document.getElementById('file-label');
    const downloadBtn = document.getElementById('download-btn');
    const qrcodeElement = document.getElementById('qrcode');
    const qrSize = 250; // Размер QR-кода

    let currentLogo = null; // Хранит объект Image логотипа

    // Инициализация QR-кода с использованием Canvas
    function generateQRBase(text, foreColor, backColor) {
        qrcodeElement.innerHTML = ''; // Очищаем старый QR
        
        // Создаем QR-код
        const qr = new QRCode(qrcodeElement, {
            text: text || " ", // Текст или пробел, если пусто
            width: qrSize,
            height: qrSize,
            colorDark : foreColor,
            colorLight : backColor,
            correctLevel : QRCode.CorrectLevel.H // Высокий уровень коррекции для лого
        });
        
        // QRCode.js по умолчанию создает и img, и canvas. Нам нужен canvas.
        // На некоторых платформах canvas может создаваться не сразу, поэтому ждем.
        setTimeout(() => {
            const canvas = qrcodeElement.querySelector('canvas');
            if (canvas && currentLogo) {
                drawLogoOnCanvas(canvas);
            }
        }, 50); // Небольшая задержка для завершения рендеринга
    }

    // Функция отрисовки логотипа поверх QR-кода
    function drawLogoOnCanvas(canvas) {
        const ctx = canvas.getContext('2d');
        
        // Рассчитываем размер и позицию логотипа
        // Логотип должен занимать не более 20-25% площади QR-кода, чтобы он считывался
        const logoSize = qrSize * 0.22; 
        const x = (qrSize - logoSize) / 2;
        const y = (qrSize - logoSize) / 2;
        
        // Рисуем белый фон под логотипом, чтобы он не сливался с кодом
        ctx.fillStyle = bgColor.value; // Используем цвет фона QR-кода
        ctx.fillRect(x - 2, y - 2, logoSize + 4, logoSize + 4); // Немного больше, чем лого
        
        // Отрисовываем само изображение логотипа
        ctx.drawImage(currentLogo, x, y, logoSize, logoSize);
    }

    // Основная функция обновления всего QR-кода
    function updateQRCode() {
        const text = textInput.value.trim();
        generateQRBase(text, fgColor.value, bgColor.value);
    }

    // Обработка загрузки файла логотипа
    logoInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) {
            currentLogo = null;
            fileLabel.textContent = "Выбрать логотип (PNG/JPG)";
            updateQRCode();
            return;
        }
        
        fileLabel.textContent = file.name; // Показываем имя файла

        const reader = new FileReader();
        reader.onload = (event) => {
            const img = new Image();
            img.onload = () => {
                currentLogo = img; // Сохраняем загруженное изображение
                updateQRCode();    // Перерисовываем QR с новым лого
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(file);
    });

    // Слушатели событий для текстового поля и цветов
    textInput.addEventListener('input', updateQRCode);
    fgColor.addEventListener('input', updateQRCode);
    bgColor.addEventListener('input', updateQRCode);

    // Логика скачивания финального изображения
    downloadBtn.addEventListener('click', () => {
        const canvas = qrcodeElement.querySelector('canvas');
        if (canvas) {
            const link = document.createElement('a');
            link.download = 'qrcode-with-logo.png';
            link.href = canvas.toDataURL("image/png");
            link.click();
        } else {
            alert("Ошибка: QR-код еще не сгенерирован.");
        }
    });

    // Первичная генерация при загрузке страницы
    updateQRCode();

</script>

</body>
</html>
